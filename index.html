<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北大法研社 財務概覽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #0f0e17;
    --bg-card: rgba(255,255,255,0.04);
    --border-card: rgba(255,255,255,0.08);
    --text-primary: #fffffe;
    --text-muted: rgba(255,255,255,0.5);
    --accent-purple: #7f5af0;
    --accent-teal: #2cb67d;
    --accent-amber: #f59e0b;
    --accent-rose: #ff6b6b;
    --accent-blue: #4cc9f0;
    --accent-lavender: #b8c1ec;
    --font-display: 'Playfair Display', serif;
    --font-body: 'Noto Sans TC', sans-serif;
  }

  body {
    background: var(--bg-deep);
    font-family: var(--font-body);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  /* Ambient glow orbs */
  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  .glow-orb.purple { width: 500px; height: 500px; background: var(--accent-purple); top: -10%; left: -5%; }
  .glow-orb.teal { width: 400px; height: 400px; background: var(--accent-teal); bottom: -10%; right: -5%; }
  .glow-orb.amber { width: 300px; height: 300px; background: var(--accent-amber); top: 40%; left: 50%; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  /* Header */
  .page-header {
    text-align: center;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease-out 0.1s forwards;
  }
  .page-header .badge {
    display: inline-block;
    padding: 6px 16px;
    border: 1px solid var(--accent-purple);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--accent-purple);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .page-header h1 {
    font-family: var(--font-display);
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 900;
    line-height: 1.2;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-lavender) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .page-header .subtitle {
    color: var(--text-muted);
    font-size: 15px;
    margin-top: 12px;
    font-weight: 400;
  }

  /* Charts grid */
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 32px;
  }

  .chart-card {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: 20px;
    padding: 36px 28px 28px;
    backdrop-filter: blur(20px);
    opacity: 0;
    transform: translateY(30px);
    position: relative;
    overflow: hidden;
    transition: border-color 0.4s, box-shadow 0.4s;
  }
  .chart-card:nth-child(1) { animation: fadeSlideUp 0.7s ease-out 0.3s forwards; }
  .chart-card:nth-child(2) { animation: fadeSlideUp 0.7s ease-out 0.5s forwards; }

  .chart-card:hover {
    border-color: rgba(255,255,255,0.15);
    box-shadow: 0 8px 40px rgba(127,90,240,0.08);
  }

  /* Subtle shimmer line on top */
  .chart-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-purple), var(--accent-teal), transparent);
    opacity: 0.6;
  }

  .chart-title {
    font-family: var(--font-body);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .chart-title .icon {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .chart-card:nth-child(1) .chart-title .icon { background: rgba(127,90,240,0.15); }
  .chart-card:nth-child(2) .chart-title .icon { background: rgba(255,107,107,0.15); }

  /* SVG chart area */
  .chart-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }

  /* Legend */
  .legend {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.25s, transform 0.2s;
  }
  .legend-item:hover {
    background: rgba(255,255,255,0.06);
    transform: translateX(4px);
  }
  .legend-item.dimmed { opacity: 0.35; }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 4px;
    flex-shrink: 0;
    box-shadow: 0 0 8px var(--dot-color);
  }
  .legend-label {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
    color: rgba(255,255,255,0.8);
  }
  .legend-value {
    font-size: 14px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  /* Footer */
  .page-footer {
    text-align: center;
    margin-top: 48px;
    color: var(--text-muted);
    font-size: 12px;
    opacity: 0;
    animation: fadeSlideUp 0.6s ease-out 0.7s forwards;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Tooltip */
  .chart-tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(15,14,23,0.92);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 20;
    transform: translate(-50%, -120%);
  }
  .chart-tooltip.visible { opacity: 1; }
</style>
</head>
<body>

<div class="glow-orb purple"></div>
<div class="glow-orb teal"></div>
<div class="glow-orb amber"></div>

<div class="container">
  <header class="page-header">
    <div class="badge">Financial Overview</div>
    <h1>北大法研社<br>財務概覽</h1>
    <p class="subtitle">收支結構分析 · 動態圖表</p>
  </header>

  <div class="charts-grid">
    <!-- Income Card -->
    <div class="chart-card" id="income-card">
      <div class="chart-title">
        <span class="icon">💰</span>
        收入結構
      </div>
      <div class="chart-wrap">
        <svg id="income-chart" width="240" height="240" viewBox="0 0 240 240"></svg>
      </div>
      <div class="legend" id="income-legend"></div>
      <div class="chart-tooltip" id="income-tooltip"></div>
    </div>

    <!-- Expense Card -->
    <div class="chart-card" id="expense-card">
      <div class="chart-title">
        <span class="icon">📤</span>
        支出結構
      </div>
      <div class="chart-wrap">
        <svg id="expense-chart" width="240" height="240" viewBox="0 0 240 240"></svg>
      </div>
      <div class="legend" id="expense-legend"></div>
      <div class="chart-tooltip" id="expense-tooltip"></div>
    </div>
  </div>

  <footer class="page-footer">
    📌 本頁面由 Claude AI 自動生成 · 北大法研社
  </footer>
</div>

<script>
const CHARTS = [
  {
    svgId: 'income-chart',
    legendId: 'income-legend',
    tooltipId: 'income-tooltip',
    data: [
      { label: 'AI、Notion 授權費', value: 60, color: '#7f5af0' },
      { label: '法學研究、出版',     value: 10, color: '#f59e0b' },
      { label: '其他收入',           value: 30, color: '#2cb67d' },
    ]
  },
  {
    svgId: 'expense-chart',
    legendId: 'expense-legend',
    tooltipId: 'expense-tooltip',
    data: [
      { label: 'AI API 維護費與獎學金', value: 25, color: '#ff6b6b' },
      { label: '法學活動',               value: 75, color: '#4cc9f0' },
    ]
  }
];

function polarToCart(cx, cy, r, angle) {
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
}

function arcPath(cx, cy, outerR, innerR, startAngle, endAngle) {
  const gap = 0.02;
  const s = startAngle + gap;
  const e = endAngle - gap;
  if (e <= s) return '';
  const large = (e - s) > Math.PI ? 1 : 0;
  const o1 = polarToCart(cx, cy, outerR, s);
  const o2 = polarToCart(cx, cy, outerR, e);
  const i1 = polarToCart(cx, cy, innerR, s);
  const i2 = polarToCart(cx, cy, innerR, e);
  return `M ${o1.x} ${o1.y} A ${outerR} ${outerR} 0 ${large} 1 ${o2.x} ${o2.y} L ${i2.x} ${i2.y} A ${innerR} ${innerR} 0 ${large} 0 ${i1.x} ${i1.y} Z`;
}

function buildChart(cfg) {
  const svg = document.getElementById(cfg.svgId);
  const legendEl = document.getElementById(cfg.legendId);
  const tooltipEl = document.getElementById(cfg.tooltipId);
  const cx = 120, cy = 120, outerR = 100, innerR = 58;
  const total = cfg.data.reduce((s, d) => s + d.value, 0);

  // Create SVG namespace elements
  const ns = 'http://www.w3.org/2000/svg';
  let cumAngle = -Math.PI / 2;
  const slices = [];

  cfg.data.forEach((d, i) => {
    const sweep = (d.value / total) * 2 * Math.PI;
    const startAngle = cumAngle;
    const endAngle = cumAngle + sweep;
    const midAngle = startAngle + sweep / 2;
    cumAngle = endAngle;

    // Slice path
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('fill', d.color);
    path.setAttribute('stroke', 'rgba(15,14,23,0.6)');
    path.setAttribute('stroke-width', '2');
    path.style.transition = 'transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s';
    path.style.transformOrigin = `${cx}px ${cy}px`;
    path.style.cursor = 'pointer';

    // Animate in
    const finalD = arcPath(cx, cy, outerR, innerR, startAngle, endAngle);
    path.setAttribute('d', arcPath(cx, cy, innerR + 1, innerR, startAngle, endAngle));
    setTimeout(() => { path.setAttribute('d', finalD); }, 100 + i * 150);
    path.style.transition = 'all 0.7s cubic-bezier(.34,1.56,.64,1)';

    svg.appendChild(path);

    // Percentage label
    if (d.value >= 10) {
      const labelR = (outerR + innerR) / 2;
      const lp = polarToCart(cx, cy, labelR, midAngle);
      const text = document.createElementNS(ns, 'text');
      text.setAttribute('x', lp.x);
      text.setAttribute('y', lp.y);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'central');
      text.setAttribute('fill', '#fff');
      text.setAttribute('font-family', "'Noto Sans TC', sans-serif");
      text.setAttribute('font-weight', '700');
      text.setAttribute('font-size', d.value >= 30 ? '15' : '12');
      text.style.pointerEvents = 'none';
      text.style.opacity = '0';
      text.style.transition = 'opacity 0.4s';
      text.textContent = d.value + '%';
      setTimeout(() => { text.style.opacity = '1'; }, 600 + i * 150);
      svg.appendChild(text);
    }

    slices.push({ path, startAngle, endAngle, midAngle, ...d });
  });

  // Center text
  const centerVal = document.createElementNS(ns, 'text');
  centerVal.setAttribute('x', cx);
  centerVal.setAttribute('y', cy - 4);
  centerVal.setAttribute('text-anchor', 'middle');
  centerVal.setAttribute('dominant-baseline', 'central');
  centerVal.setAttribute('fill', '#fffffe');
  centerVal.setAttribute('font-family', "'Noto Sans TC', sans-serif");
  centerVal.setAttribute('font-weight', '900');
  centerVal.setAttribute('font-size', '20');
  centerVal.textContent = '100%';
  svg.appendChild(centerVal);

  const centerLabel = document.createElementNS(ns, 'text');
  centerLabel.setAttribute('x', cx);
  centerLabel.setAttribute('y', cy + 16);
  centerLabel.setAttribute('text-anchor', 'middle');
  centerLabel.setAttribute('dominant-baseline', 'central');
  centerLabel.setAttribute('fill', 'rgba(255,255,255,0.4)');
  centerLabel.setAttribute('font-family', "'Noto Sans TC', sans-serif");
  centerLabel.setAttribute('font-weight', '500');
  centerLabel.setAttribute('font-size', '11');
  centerLabel.textContent = '總計';
  svg.appendChild(centerLabel);

  // Hover logic
  function highlightSlice(index) {
    slices.forEach((s, i) => {
      if (i === index) {
        const dx = Math.cos(s.midAngle) * 8;
        const dy = Math.sin(s.midAngle) * 8;
        s.path.style.transform = `translate(${dx}px, ${dy}px)`;
        s.path.style.opacity = '1';
        s.path.style.filter = `drop-shadow(0 0 12px ${s.color}66)`;
      } else {
        s.path.style.transform = 'translate(0,0)';
        s.path.style.opacity = '0.4';
        s.path.style.filter = 'none';
      }
    });
    centerVal.textContent = slices[index].value + '%';
    centerLabel.textContent = slices[index].label;
    legendItems.forEach((el, i) => el.classList.toggle('dimmed', i !== index));
  }

  function resetSlices() {
    slices.forEach(s => {
      s.path.style.transform = 'translate(0,0)';
      s.path.style.opacity = '1';
      s.path.style.filter = 'none';
    });
    centerVal.textContent = '100%';
    centerLabel.textContent = '總計';
    tooltipEl.classList.remove('visible');
    legendItems.forEach(el => el.classList.remove('dimmed'));
  }

  slices.forEach((s, i) => {
    s.path.addEventListener('mouseenter', () => highlightSlice(i));
    s.path.addEventListener('mouseleave', resetSlices);
    s.path.addEventListener('mousemove', (e) => {
      const card = document.getElementById(cfg.svgId).closest('.chart-card');
      const rect = card.getBoundingClientRect();
      tooltipEl.textContent = `${s.label}：${s.value}%`;
      tooltipEl.style.left = (e.clientX - rect.left) + 'px';
      tooltipEl.style.top = (e.clientY - rect.top) + 'px';
      tooltipEl.classList.add('visible');
    });
  });

  // Legend
  const legendItems = [];
  cfg.data.forEach((d, i) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <span class="legend-dot" style="background:${d.color}; --dot-color:${d.color}"></span>
      <span class="legend-label">${d.label}</span>
      <span class="legend-value" style="color:${d.color}">${d.value}%</span>
    `;
    item.addEventListener('mouseenter', () => highlightSlice(i));
    item.addEventListener('mouseleave', resetSlices);
    legendEl.appendChild(item);
    legendItems.push(item);
  });
}

// Init all charts
CHARTS.forEach(buildChart);
</script>
</body>
</html>
